<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="900" height="540" fill="#1b1d21"/>
  <!-- dimmed backdrop -->
  <rect width="900" height="540" fill="#000" opacity="0.45"/>

  <!-- modal -->
  <rect x="250" y="60" width="400" height="430" rx="8" fill="#292d31" stroke="#444649"/>
  <!-- header -->
  <rect x="250" y="60" width="400" height="42" rx="8" fill="#23262b"/>
  <rect x="250" y="92" width="400" height="10" fill="#23262b"/>
  <text x="270" y="87" fill="#f0f0f0" font-size="15" font-weight="bold">Settings</text>
  <text x="624" y="87" fill="#a6a6a6" font-size="16">×</text>
  <line x1="250" y1="102" x2="650" y2="102" stroke="#444649"/>

  <g font-size="12">
    <!-- theme -->
    <text x="270" y="130" fill="#a6a6a6">Theme</text>
    <rect x="270" y="138" width="360" height="26" rx="4" fill="#1b1d21" stroke="#444649"/>
    <text x="282" y="155" fill="#f0f0f0">System</text>
    <text x="612" y="155" fill="#a6a6a6">▾</text>

    <!-- persist tabs -->
    <rect x="270" y="178" width="14" height="14" rx="3" fill="#0d6efd"/>
    <text x="276" y="189" fill="#fff" font-size="11">✓</text>
    <text x="294" y="190" fill="#f0f0f0">Persist open tabs across reloads</text>

    <!-- preview limit -->
    <text x="270" y="216" fill="#a6a6a6">Preview text size limit (MB)</text>
    <rect x="470" y="204" width="160" height="24" rx="4" fill="#1b1d21" stroke="#444649"/>
    <text x="482" y="221" fill="#f0f0f0">10</text>

    <!-- upload chunk -->
    <text x="270" y="248" fill="#a6a6a6">Upload chunk size (MB)</text>
    <rect x="470" y="236" width="160" height="24" rx="4" fill="#1b1d21" stroke="#444649"/>
    <text x="482" y="253" fill="#f0f0f0">4</text>

    <!-- output line limit -->
    <text x="270" y="280" fill="#a6a6a6">Output pane line limit</text>
    <rect x="470" y="268" width="160" height="24" rx="4" fill="#1b1d21" stroke="#444649"/>
    <text x="482" y="285" fill="#f0f0f0">5000</text>
    <text x="270" y="300" fill="#6b6f76" font-size="10">Streaming panes keep at most this many lines; 0 = unlimited.</text>

    <line x1="270" y1="314" x2="630" y2="314" stroke="#444649"/>

    <!-- update source -->
    <text x="270" y="336" fill="#a6a6a6">Update source (GitHub repo or releases URL)</text>
    <rect x="270" y="344" width="360" height="26" rx="4" fill="#1b1d21" stroke="#444649"/>
    <text x="282" y="361" fill="#f0f0f0">acme/widgets</text>
    <text x="270" y="386" fill="#6b6f76" font-size="10">Releases here are used to offer self-updates.</text>

    <!-- check on startup -->
    <rect x="270" y="400" width="14" height="14" rx="3" fill="#0d6efd"/>
    <text x="276" y="411" fill="#fff" font-size="11">✓</text>
    <text x="294" y="412" fill="#f0f0f0">Check for updates on startup</text>

    <!-- check now button -->
    <rect x="270" y="426" width="170" height="26" rx="4" fill="#1b1d21" stroke="#75b6fd"/>
    <text x="286" y="443" fill="#75b6fd">Check for updates now</text>
  </g>

  <!-- footer -->
  <line x1="250" y1="468" x2="650" y2="468" stroke="#444649"/>
  <rect x="486" y="476" width="70" height="26" rx="4" fill="#3a3f45"/>
  <text x="500" y="493" fill="#f0f0f0" font-size="12">Cancel</text>
  <rect x="566" y="476" width="64" height="26" rx="4" fill="#0d6efd"/>
  <text x="584" y="493" fill="#fff" font-size="12">Save</text>
</svg>
