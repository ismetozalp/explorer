<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="900" height="540" fill="#1b1d21"/>

  <!-- top tab bar -->
  <rect x="0" y="0" width="900" height="34" fill="#23262b"/>
  <line x1="0" y1="34" x2="900" y2="34" stroke="#444649"/>
  <rect x="10" y="6" width="92" height="22" rx="4" fill="#292d31" stroke="#444649"/>
  <text x="22" y="21" fill="#f0f0f0" font-size="11">explorer</text>
  <rect x="106" y="6" width="70" height="22" rx="4" fill="#1b1d21" stroke="#34383d"/>
  <text x="118" y="21" fill="#a6a6a6" font-size="11">~/work</text>
  <!-- right-side toolbar buttons -->
  <text x="612" y="22" fill="#75b6fd" font-size="12" font-weight="bold">▤ tmux</text>
  <text x="690" y="22" fill="#a6a6a6" font-size="12">⛁ Mounts</text>
  <text x="772" y="22" fill="#a6a6a6" font-size="12">⏻ GRUB</text>
  <rect x="606" y="3" width="56" height="28" rx="4" fill="none" stroke="#75b6fd" opacity="0.5"/>

  <!-- faint file list behind -->
  <g opacity="0.5" font-size="12" fill="#6b6f76">
    <text x="20" y="70">Name</text>
    <text x="20" y="96">Documents</text>
    <text x="20" y="120">Downloads</text>
    <text x="20" y="144">projects</text>
    <text x="20" y="168">.bashrc</text>
    <text x="20" y="192">.tmux.conf</text>
    <line x1="14" y1="78" x2="560" y2="78" stroke="#2a2e33"/>
  </g>

  <!-- tmux dropdown panel (anchored under the ▤ tmux button) -->
  <rect x="556" y="44" width="300" height="288" rx="8" fill="#292d31" stroke="#444649"/>
  <!-- head -->
  <rect x="556" y="44" width="300" height="34" rx="8" fill="#23262b"/>
  <rect x="556" y="68" width="300" height="10" fill="#23262b"/>
  <text x="572" y="66" fill="#f0f0f0" font-size="12">tmux sessions</text>
  <text x="834" y="66" fill="#a6a6a6" font-size="13">⟳</text>
  <line x1="556" y1="78" x2="856" y2="78" stroke="#444649"/>

  <!-- session rows -->
  <g font-size="12">
    <!-- row 1: open + attached -->
    <rect x="556" y="86" width="300" height="40" fill="#2b3036"/>
    <text x="572" y="103" fill="#f0f0f0">main</text>
    <text x="572" y="118" fill="#8a8f96" font-size="10">3 windows · attached</text>
    <rect x="760" y="96" width="40" height="18" rx="9" fill="#1b1d21" stroke="#3a6f3a"/>
    <text x="769" y="109" fill="#5cd66b" font-size="10">open</text>
    <text x="836" y="110" fill="#a6a6a6">✕</text>
    <line x1="556" y1="126" x2="856" y2="126" stroke="#2a2e33"/>
    <!-- row 2 -->
    <text x="572" y="148" fill="#f0f0f0">build</text>
    <text x="572" y="163" fill="#8a8f96" font-size="10">1 window</text>
    <text x="836" y="155" fill="#a6a6a6">✕</text>
    <line x1="556" y1="172" x2="856" y2="172" stroke="#2a2e33"/>
    <!-- row 3 -->
    <text x="572" y="194" fill="#f0f0f0">logs</text>
    <text x="572" y="209" fill="#8a8f96" font-size="10">2 windows</text>
    <text x="836" y="201" fill="#a6a6a6">✕</text>
  </g>

  <!-- foot -->
  <line x1="556" y1="226" x2="856" y2="226" stroke="#444649"/>
  <!-- New session (dashed) -->
  <rect x="566" y="234" width="280" height="30" rx="4" fill="none" stroke="#5a5f66" stroke-dasharray="4 3"/>
  <text x="588" y="253" fill="#75b6fd" font-size="12">＋ New session…</text>
  <!-- Edit .tmux.conf (solid, the new button) -->
  <rect x="566" y="270" width="280" height="30" rx="4" fill="none" stroke="#75b6fd"/>
  <text x="592" y="289" fill="#75b6fd" font-size="12">⚙ Edit .tmux.conf</text>

  <!-- callout -->
  <text x="566" y="320" fill="#6b6f76" font-size="10">Shown only when ~/.tmux.conf exists — opens it in the editor.</text>
</svg>
